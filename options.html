<!DOCTYPE html>
<html>
  <head>
    <title>Element Hider Options</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #1e1e1e;
        color: #e0e0e0;
        padding: 30px;
        margin: 0;
        min-width: 650px;
        max-width: 900px;
        margin-left: auto;
        margin-right: auto;
      }
      h2 { font-size: 20px; margin-top: 0; margin-bottom: 20px; text-align: center; }
      .actions-bar {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 25px;
      }
      .domain-card {
        background-color: #2a2a2a;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      .domain-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-weight: bold;
        font-family: monospace;
        font-size: 16px;
        color: #4da6ff;
      }
      .add-rule-container {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      select, input[type="text"] {
        padding: 9px 12px;
        border-radius: 4px;
        background-color: #1e1e1e;
        color: #fff;
        border: 1px solid #555;
        font-family: monospace;
        font-size: 13px;
        box-sizing: border-box;
      }
      select:focus, input[type="text"]:focus {
        outline: none;
        border-color: #007acc;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 250px;
        overflow-y: auto;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #1e1e1e;
        padding: 10px 12px;
        margin-bottom: 8px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 13px;
        gap: 15px;
      }
      li span {
        word-break: break-all;
        flex-grow: 1;
      }
      button, label.file-btn {
        background: #444;
        color: #fff;
        border: none;
        padding: 9px 16px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 13px;
        font-weight: bold;
        white-space: nowrap;
        display: inline-block;
        text-align: center;
      }
      button:hover, label.file-btn:hover { background: #555; }
      .primary-btn { background: #007acc; }
      .primary-btn:hover { background: #005999; }
      .delete-btn { background: #cc3333; padding: 6px 12px; font-size: 12px; }
      .delete-btn:hover { background: #e64d4d; }
      .no-rules { color: #888; font-style: italic; font-size: 13px; }
      input[type="file"] { display: none; }
    </style>
  </head>
  <body>
    <h2>Managed Hidden Elements</h2>
    
    <div class="actions-bar">
      <button id="export-btn" class="primary-btn">Export Backup (JSON)</button>
      <label for="import-file" class="file-btn primary-btn">Import Backup</label>
      <input type="file" id="import-file" accept=".json">
    </div>

    <!-- Manual Rule Addition Card -->
    <div class="domain-card">
      <div class="domain-header" style="color: #e0e0e0; margin-bottom: 15px;">
        <span>Add Custom Rule</span>
      </div>
      <div class="add-rule-container">
        <select id="domain-select" style="flex: 1; min-width: 200px;">
          <option value="">Loading open tabs...</option>
        </select>
        <input type="text" id="custom-domain-input" placeholder="e.g. mail.google.com" style="display: none; flex: 1; min-width: 180px;">
        <input type="text" id="selector-input" placeholder='Selector or CSS rule...' style="flex: 2; min-width: 250px;">
        <button id="add-rule-btn" class="primary-btn">Add Rule</button>
      </div>
    </div>

    <div id="rules-container">Loading...</div>

    <script src="options.js"></script>
  </body>
</html>
