<!DOCTYPE html>
<html>
  <head>
    <title>Element Hider Options</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #1e1e1e;
        color: #e0e0e0;
        padding: 30px;
        margin: 0;
        min-width: 650px;
        max-width: 900px;
        margin-left: auto;
        margin-right: auto;
      }
      h2 { font-size: 20px; margin-top: 0; margin-bottom: 20px; text-align: center; }
      .domain-card {
        background-color: #2a2a2a;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
      .domain-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-weight: bold;
        font-family: monospace;
        font-size: 16px;
        color: #4da6ff;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 250px;
        overflow-y: auto;
      }
      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #1e1e1e;
        padding: 10px 12px;
        margin-bottom: 8px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 13px;
        gap: 15px;
      }
      li span {
        word-break: break-all;
        flex-grow: 1;
      }
      button {
        background: #444;
        color: #fff;
        border: none;
        padding: 6px 12px;
        cursor: pointer;
        border-radius: 4px;
        font-size: 12px;
        white-space: nowrap;
      }
      button:hover { background: #555; }
      .delete-btn { background: #cc3333; }
      .delete-btn:hover { background: #e64d4d; }
      .no-rules { color: #888; font-style: italic; font-size: 13px; }
    </style>
  </head>
  <body>
    <h2>Managed Hidden Elements (Open Tabs & Saved Sites)</h2>
    <div id="rules-container">Loading...</div>

    <script src="options.js"></script>
  </body>
</html>
